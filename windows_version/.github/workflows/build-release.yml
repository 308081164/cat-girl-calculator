name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm calculator.spec

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer.iss

      - name: Zip exe output
        shell: pwsh
        run: Compress-Archive -Path dist/LittleComputer.exe -DestinationPath dist/LittleComputer-exe.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-artifacts
          path: |
            dist/LittleComputer.exe
            dist/LittleComputer-exe.zip
            Output/LittleComputerInstaller.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/LittleComputer.exe
            dist/LittleComputer-exe.zip
            Output/LittleComputerInstaller.exe
